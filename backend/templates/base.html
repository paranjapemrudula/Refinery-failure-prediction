<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refinery Monitor</title>
    <style>
        :root {
            --bg: #f5f1e8;
            --panel: #fffaf2;
            --panel-strong: #f1e4ca;
            --ink: #132a35;
            --accent: #bf5b04;
            --accent-dark: #7f3400;
            --ok: #2f7d4a;
            --warn: #b77900;
            --danger: #ab2e1f;
            --line: #d9c9ae;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, #fef4da 0%, transparent 35%),
                linear-gradient(145deg, #efe4d3 0%, #f8f3eb 48%, #e9dcc6 100%);
            min-height: 100vh;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .shell {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 24px 0 48px;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding: 18px 22px;
            border: 1px solid var(--line);
            background: rgba(255, 250, 242, 0.88);
            backdrop-filter: blur(8px);
        }

        .brand {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .nav-links {
            display: flex;
            gap: 16px;
            font-size: 0.98rem;
        }

        .hero,
        .panel {
            border: 1px solid var(--line);
            background: rgba(255, 250, 242, 0.9);
            box-shadow: 0 10px 25px rgba(19, 42, 53, 0.08);
        }

        .hero {
            padding: 28px;
            margin-bottom: 24px;
        }

        .hero h1,
        .panel h2,
        .panel h3 {
            margin-top: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 24px;
        }

        .panel {
            padding: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .form-control {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--line);
            background: white;
            color: var(--ink);
            font-size: 1rem;
        }

        .btn {
            display: inline-block;
            margin-top: 18px;
            padding: 12px 18px;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
        }

        .btn:hover {
            background: var(--accent-dark);
        }

        .stat {
            padding: 14px 0;
            border-bottom: 1px solid var(--line);
        }

        .stat:last-child {
            border-bottom: none;
        }

        .status-chip {
            display: inline-block;
            padding: 6px 10px;
            font-size: 0.9rem;
            font-weight: 700;
            color: white;
        }

        .status-low,
        .status-healthy {
            background: var(--ok);
        }

        .status-medium {
            background: var(--warn);
        }

        .status-high,
        .status-risk {
            background: var(--danger);
        }

        .message {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-left: 4px solid var(--accent);
            background: var(--panel-strong);
        }

        .reading-list {
            display: grid;
            gap: 12px;
        }

        .reading-list.compact {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .reading-card {
            padding: 16px;
            border: 1px solid var(--line);
            background: white;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        .metric-card {
            padding: 16px;
            border: 1px solid var(--line);
            background: white;
        }

        .machine-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }

        .machine-card {
            padding: 18px;
            border: 1px solid var(--line);
            background: white;
        }

        .probability-bar {
            height: 12px;
            margin: 10px 0 6px;
            background: #eadfcf;
            overflow: hidden;
        }

        .probability-fill {
            height: 100%;
            background: linear-gradient(90deg, #e8a623 0%, #c94e1c 100%);
        }

        .chart-row {
            margin-bottom: 14px;
        }

        .chart-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            margin-bottom: 6px;
        }

        .alert-bar {
            height: 14px;
            background: #eadfcf;
            overflow: hidden;
        }

        .alert-fill {
            height: 100%;
        }

        @media (max-width: 800px) {
            .grid,
            .form-grid,
            .metric-grid,
            .machine-grid,
            .reading-list.compact {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="nav">
            <a class="brand" href="{% url 'dashboard' %}">Refinery Monitor</a>
            <div class="nav-links">
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'sensor_entry' %}">New Sensor Entry</a>
                <a href="/admin/">Admin</a>
            </div>
        </div>
        {% if messages %}
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
