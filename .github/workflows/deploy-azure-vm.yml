name: Deploy Azure VM

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs:
      - ci-gate
    steps:
      - name: Deploy to Azure VM over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/refinery-monitor
            bash deploy/azure-vm/scripts/release.sh

  ci-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run Django system checks
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_DEBUG: "True"
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: /tmp/refinery-monitor-ci.sqlite3
        working-directory: backend
        run: python manage.py check

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
